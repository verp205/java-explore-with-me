version: "3.8"

services:
  stats-db:
    image: postgres:15
    container_name: stats-db
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: stats
    ports:
      - "5432:5432"

  stats-service:
    build:
      context: .
      dockerfile: stats-service/Dockerfile
    image: stats-service
    depends_on:
      - stats-db
    ports:
      - "9090:9090"

  main-service:
    build:
      context: .
      dockerfile: main-service/Dockerfile
    image: main-service
    depends_on:
      - stats-service
    ports:
      - "8080:8080"
